name: ArchiveCaptureiOS
options:
  bundleIdPrefix: com.archiveprocessor
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26"
settings:
  base:
    # Swift 5 language mode for this app target: AVFoundation (camera/QR) fights strict Swift 6
    # concurrency (non-Sendable AVCaptureSession across queues). The Mac app stays Swift 6.
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  ArchiveCaptureiOS:
    type: application
    platform: iOS
    sources:
      - Sources/ArchiveCaptureiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archiveprocessor.capture.ios
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/ArchiveCaptureiOS/Info.plist
      properties:
        CFBundleDisplayName: Archive Capture
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: "Used to photograph documents and send them to the Archive Processor Mac app."
        NSLocalNetworkUsageDescription: "Used to connect to the Archive Processor Mac app on your local network to send captured photos."
        NSBonjourServices: ["_archiveproc._tcp"]
        ITSAppUsesNonExemptEncryption: false
